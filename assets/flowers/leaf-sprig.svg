    <path d="M30 87 L 23.5 69.5" fill="none" stroke="#8FA37E" stroke-width="0.8" stroke-linecap="round"/>
    <path d="M48 80 L 58.5 91.5" fill="none" stroke="#8FA37E" stroke-width="0.8" stroke-linecap="round"/>
    <path d="M72 70 L 63.5 52.5" fill="none" stroke="#8FA37E" stroke-width="0.8" stroke-linecap="round"/>
    <path d="M94 58 L 104.5 67.5" fill="none" stroke="#8FA37E" stroke-width="0.8" stroke-linecap="round"/>
    <path d="M118 46 L 109.5 30.5" fill="none" stroke="#8FA37E" stroke-width="0.8" stroke-linecap="round"/>
    <path d="M140 33 L 150.5 40.5" fill="none" stroke="#8FA37E" stroke-width="0.8" stroke-linecap="round"/>
  </g>

  <g class="bloom">
    <g class="petals">
      <g class="leaf" id="leaf-sprig-leaf1">
