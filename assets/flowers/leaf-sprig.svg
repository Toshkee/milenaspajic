<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 170 120" role="img" fill="none">
  <title>Botanical leaf sprig — arching sage foliage accent</title>
  <defs>
    <linearGradient id="leaf-sprig-stem-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6F8463"/>
      <stop offset="0.6" stop-color="#8FA37E"/>
      <stop offset="1" stop-color="#C8A062"/>
    </linearGradient>
    <linearGradient id="leaf-sprig-leaf-a" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#A9BD9C"/>
      <stop offset="0.5" stop-color="#8FA37E"/>
      <stop offset="1" stop-color="#6F8463"/>
    </linearGradient>
    <linearGradient id="leaf-sprig-leaf-b" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#A9BD9C"/>
      <stop offset="0.5" stop-color="#8FA37E"/>
      <stop offset="1" stop-color="#6F8463"/>
    </linearGradient>
    <radialGradient id="leaf-sprig-tip" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#A9BD9C"/>
      <stop offset="1" stop-color="#8FA37E"/>
    </radialGradient>
  </defs>

  <g class="stem">
    <path class="stem-line" d="M6 92 C 44 84, 86 66, 118 46 C 138 33, 152 24, 162 19"
