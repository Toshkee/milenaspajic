        <path d="M62.5 50.5 C 59 43, 57.5 38, 57 33.5" fill="none" stroke="#6F8463" stroke-width="0.6" stroke-linecap="round"/>
      </g>
      <g class="leaf" id="leaf-sprig-leaf4">
