      <stop offset="32%" stop-color="#D6336C"/>
      <stop offset="72%" stop-color="#E891A9"/>
      <stop offset="100%" stop-color="#FCE3EA"/>
    </radialGradient>
    <radialGradient id="rose-bloom-mid" cx="50%" cy="50%" r="58%" fx="50%" fy="50%">
