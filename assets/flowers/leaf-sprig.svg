        <path d="M106 66 C 114 66, 121 65, 127 63.5" fill="none" stroke="#6F8463" stroke-width="0.6" stroke-linecap="round"/>
      </g>
      <g class="leaf" id="leaf-sprig-leaf5">
        <path class="petal" d="M109.5 30.5 C 101 23, 98 12, 104 6.5 C 112.5 11.5, 115.5 23.5, 109.5 30.5 Z"
