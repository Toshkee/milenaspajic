        <path d="M108.5 28.5 C 105 21, 104 16, 104 11.5" fill="none" stroke="#6F8463" stroke-width="0.6" stroke-linecap="round"/>
      </g>
      <g class="leaf" id="leaf-sprig-leaf6">
        <path class="petal" d="M150.5 40.5 C 159 46, 168.5 43.5, 169.5 36.5 C 162.5 31, 153 33.5, 150.5 40.5 Z"
