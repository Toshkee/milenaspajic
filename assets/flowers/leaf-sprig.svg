        <path d="M152 39 C 158 38.5, 163 37.5, 167.5 36.5" fill="none" stroke="#6F8463" stroke-width="0.6" stroke-linecap="round"/>
      </g>
      <g class="leaf" id="leaf-sprig-tip-leaf">
        <path class="petal" d="M162 19 C 157.5 11.5, 158.5 4, 164 2 C 168.5 7.5, 167.5 15, 162 19 Z"
              fill="url(#leaf-sprig-tip)" stroke="#4A1D3F" stroke-width="0.75"/>
        <path d="M162.5 17.5 C 161 12.5, 161 9, 162 5.5" fill="none" stroke="#6F8463" stroke-width="0.6" stroke-linecap="round"/>
      </g>
    </g>
