      <stop offset="0.5" stop-color="#D6336C"/>
      <stop offset="1" stop-color="#E891A9"/>
    </radialGradient>
    <linearGradient id="rose-bud-wrapL" x1="0.1" y1="0" x2="0.9" y2="1">
