        <path d="M60 90 C 68 90, 75 89.5, 82 88.5" fill="none" stroke="#6F8463" stroke-width="0.6" stroke-linecap="round"/>
      </g>
      <g class="leaf" id="leaf-sprig-leaf3">
        <path class="petal" d="M63.5 52.5 C 54 47, 50 35.5, 55 29 C 64.5 33, 69 44.5, 63.5 52.5 Z"
