<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" fill="none">
  <title>Small wild blossom accent with champagne-gold stamens</title>
  <defs>
    <radialGradient id="blossom-small-petal" cx="50%" cy="80%" r="78%">
      <stop offset="0%" stop-color="#FFF5F7"/>
      <stop offset="40%" stop-color="#FCE3EA"/>
      <stop offset="78%" stop-color="#F7C9D6"/>
      <stop offset="100%" stop-color="#E891A9"/>
    </radialGradient>
    <radialGradient id="blossom-small-petal-deep" cx="50%" cy="82%" r="82%">
      <stop offset="0%" stop-color="#FCE3EA"/>
      <stop offset="45%" stop-color="#F7C9D6"/>
      <stop offset="80%" stop-color="#E891A9"/>
      <stop offset="100%" stop-color="#D6336C"/>
    </radialGradient>
    <radialGradient id="blossom-small-core" cx="50%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#FCE3EA"/>
      <stop offset="55%" stop-color="#E891A9"/>
      <stop offset="100%" stop-color="#A61E4D"/>
    </radialGradient>
  </defs>

  <g class="bloom">
    <g class="petals">
      <!-- 5 rounded petals arranged radially around center (50,50) -->
      <path class="petal" transform="rotate(0 50 50)"
        d="M50 49.5 C45.4 45.8 41.6 39.2 41.6 31.8 C41.6 24.4 45.2 19.4 50 16.8 C54.8 19.4 58.4 24.4 58.4 31.8 C58.4 39.2 54.6 45.8 50 49.5 Z"
        fill="url(#blossom-small-petal-deep)" stroke="#831843" stroke-width="0.9"/>
      <path class="petal" transform="rotate(72 50 50)"
        d="M50 49.5 C45.4 45.8 41.6 39.2 41.6 31.8 C41.6 24.4 45.2 19.4 50 16.8 C54.8 19.4 58.4 24.4 58.4 31.8 C58.4 39.2 54.6 45.8 50 49.5 Z"
        fill="url(#blossom-small-petal)" stroke="#831843" stroke-width="0.9"/>
      <path class="petal" transform="rotate(144 50 50)"
        d="M50 49.5 C45.4 45.8 41.6 39.2 41.6 31.8 C41.6 24.4 45.2 19.4 50 16.8 C54.8 19.4 58.4 24.4 58.4 31.8 C58.4 39.2 54.6 45.8 50 49.5 Z"
        fill="url(#blossom-small-petal-deep)" stroke="#831843" stroke-width="0.9"/>
      <path class="petal" transform="rotate(216 50 50)"
        d="M50 49.5 C45.4 45.8 41.6 39.2 41.6 31.8 C41.6 24.4 45.2 19.4 50 16.8 C54.8 19.4 58.4 24.4 58.4 31.8 C58.4 39.2 54.6 45.8 50 49.5 Z"
        fill="url(#blossom-small-petal)" stroke="#831843" stroke-width="0.9"/>
      <path class="petal" transform="rotate(288 50 50)"
        d="M50 49.5 C45.4 45.8 41.6 39.2 41.6 31.8 C41.6 24.4 45.2 19.4 50 16.8 C54.8 19.4 58.4 24.4 58.4 31.8 C58.4 39.2 54.6 45.8 50 49.5 Z"
        fill="url(#blossom-small-petal-deep)" stroke="#831843" stroke-width="0.9"/>
    </g>

    <!-- faint petal veins -->
    <g class="veins" stroke="#831843" stroke-width="0.45" opacity="0.35" stroke-linecap="round">
      <path transform="rotate(0 50 50)"   d="M50 48 C50 38 50 28 50 21"/>
      <path transform="rotate(72 50 50)"  d="M50 48 C50 38 50 28 50 21"/>
      <path transform="rotate(144 50 50)" d="M50 48 C50 38 50 28 50 21"/>
      <path transform="rotate(216 50 50)" d="M50 48 C50 38 50 28 50 21"/>
      <path transform="rotate(288 50 50)" d="M50 48 C50 38 50 28 50 21"/>
    </g>

    <!-- center core -->
    <g class="center">
      <circle cx="50" cy="50" r="6.2" fill="url(#blossom-small-core)" stroke="#831843" stroke-width="0.7"/>
      <g class="stamens" stroke="#B8915A" stroke-width="0.7" stroke-linecap="round">
        <path d="M50 50 L50 41.5"/>
        <path d="M50 50 L57.5 45.2"/>
        <path d="M50 50 L57.2 54.8"/>
        <path d="M50 50 L42.8 54.8"/>
        <path d="M50 50 L42.5 45.2"/>
        <path d="M50 50 L53.8 41"/>
        <path d="M50 50 L46.2 41"/>
      </g>
      <g class="anthers" fill="#C8A062">
        <circle cx="50" cy="41" r="1.3"/>
        <circle cx="58" cy="44.7" r="1.3"/>
        <circle cx="57.7" cy="55.3" r="1.3"/>
        <circle cx="42.3" cy="55.3" r="1.3"/>
        <circle cx="42" cy="44.7" r="1.3"/>
        <circle cx="54.2" cy="40.4" r="1.1"/>
        <circle cx="45.8" cy="40.4" r="1.1"/>
      </g>
      <circle cx="50" cy="50" r="2" fill="#A61E4D"/>
    </g>
  </g>
</svg>